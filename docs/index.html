<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppGym - Gestión de Clientes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .form-section {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 30px;
      border-left: 4px solid #007bff;
    }

    .form-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    input[type="text"],
    input[type="tel"] {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #555;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    button.delete {
      background: #dc3545;
      padding: 6px 12px;
      font-size: 12px;
    }

    button.delete:hover {
      background: #c82333;
    }

    .table-section {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    thead {
      background: #f1f1f1;
    }

    th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #ddd;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      color: #666;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .checkbox-cell {
      text-align: center;
    }

    .actions-cell {
      text-align: center;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-paid {
      background: #d4edda;
      color: #155724;
    }

    .status-unpaid {
      background: #f8d7da;
      color: #721c24;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #f5c6cb;
    }

    .success {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #c3e6cb;
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginScreen" style="display:none; max-width:360px; margin:80px auto;">
    <div style="background:white; padding:40px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
      <h1 style="text-align:center; margin-bottom:30px; font-size:22px;">🏋️ AppGym</h1>
      <div id="loginError"></div>
      <div style="display:flex; flex-direction:column; gap:12px;">
        <input type="text" id="loginUsername" placeholder="Usuario" style="padding:10px 12px; border:1px solid #ddd; border-radius:4px; font-size:14px;" />
        <input type="password" id="loginPassword" placeholder="Contraseña" style="padding:10px 12px; border:1px solid #ddd; border-radius:4px; font-size:14px;" onkeydown="if(event.key==='Enter') login()" />
        <button onclick="login()" style="padding:12px;">Ingresar</button>
      </div>
    </div>
  </div>

  <!-- App -->
  <div id="appScreen" style="display:none;">
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
      <h1 style="margin:0;">🏋️ <span id="gymNombre">AppGym</span></h1>
      <button onclick="logout()" style="background:#6c757d; padding:8px 16px; font-size:13px;">Salir</button>
    </div>

    <div id="message"></div>

    <div class="form-section">
      <h2 style="margin-bottom: 15px; font-size: 18px; color: #333;">Agregar Cliente</h2>
      <div class="form-group">
        <input
          type="text"
          id="nombre"
          placeholder="Nombre del cliente"
        />
        <input
          type="tel"
          id="telefono"
          placeholder="Teléfono (ej: 1123456789)"
        />
        <label>
          <input type="checkbox" id="pagado" />
          Pagado
        </label>
        <button onclick="addClient()">Agregar Cliente</button>
      </div>
    </div>

    <div class="table-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin: 0; font-size: 18px; color: #333;">Clientes</h2>
        <div style="gap: 10px; display: flex;">
          <button onclick="sendMessages('day8')" style="background: #28a745;">📱 Recordatorio Día 8</button>
          <button onclick="sendMessages('day10')" style="background: #dc3545;">⚠️ Aviso Día 10</button>
        </div>
      </div>
      <div style="margin-bottom: 15px;">
        <input
          type="text"
          id="searchNombre"
          placeholder="Buscar por nombre..."
          oninput="filterClients()"
          style="width: 100%; max-width: 300px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;"
        />
      </div>
      <div id="clientsList"></div>
    </div>
  </div>
  </div><!-- /appScreen -->

  <script>
    const API_URL = 'https://app-gym-xi.vercel.app/api';

    let allClients = [];

    function getToken() {
      return localStorage.getItem('token');
    }

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`
      };
    }

    function checkAuth() {
      const token = getToken();
      if (token) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        const gym = localStorage.getItem('gym');
        if (gym) document.getElementById('gymNombre').textContent = gym;
        loadClients();
      } else {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('appScreen').style.display = 'none';
      }
    }

    async function login() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        localStorage.setItem('token', data.token);
        localStorage.setItem('gym', data.gym);
        errorDiv.innerHTML = '';
        checkAuth();
      } catch (err) {
        errorDiv.innerHTML = `<div class="error">${err.message}</div>`;
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('gym');
      checkAuth();
    }

    function handleUnauthorized(res) {
      if (res.status === 401) {
        logout();
        return true;
      }
      return false;
    }

    async function loadClients() {
      try {
        const response = await fetch(`${API_URL}/clients`, { headers: authHeaders() });
        if (handleUnauthorized(response)) return;
        allClients = await response.json();
        renderClients(allClients);
      } catch (error) {
        showMessage('Error cargando clientes', 'error');
        console.error(error);
      }
    }

    function filterClients() {
      const query = document.getElementById('searchNombre').value.trim().toLowerCase();
      const filtered = allClients.filter(c => c.nombre.toLowerCase().includes(query));
      renderClients(filtered);
    }

    function renderClients(clients) {
      const container = document.getElementById('clientsList');

      if (clients.length === 0) {
        container.innerHTML = '<div class="empty-state">No hay clientes. Agrega uno para empezar.</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Estado</th>
              <th>Pagado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
      `;

      clients.forEach(client => {
        const statusBadge = client.pagado
          ? '<span class="status-badge status-paid">✓ Pagado</span>'
          : '<span class="status-badge status-unpaid">✗ No pagado</span>';

        html += `
          <tr id="row-${client.id}">
            <td id="nombre-${client.id}">${client.nombre}</td>
            <td id="telefono-${client.id}">${client.telefono}</td>
            <td>${statusBadge}</td>
            <td class="checkbox-cell">
              <input
                type="checkbox"
                ${client.pagado ? 'checked' : ''}
                onchange="togglePayment(${client.id}, this.checked)"
              />
            </td>
            <td class="actions-cell" style="display:flex; gap:6px; justify-content:center;">
              <button style="background:#ffc107; color:#333; padding:6px 12px; font-size:12px;" onclick="startEdit(${client.id}, '${client.nombre.replace(/'/g, "\\'")}', '${client.telefono}')">Editar</button>
              <button class="delete" onclick="deleteClient(${client.id})">Eliminar</button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    async function addClient() {
      const nombre = document.getElementById('nombre').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const pagado = document.getElementById('pagado').checked;

      if (!nombre || !telefono) {
        showMessage('Completa nombre y teléfono', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/clients`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ nombre, telefono, pagado })
        });

        if (!response.ok) throw new Error('Error al crear cliente');

        document.getElementById('nombre').value = '';
        document.getElementById('telefono').value = '';
        document.getElementById('pagado').checked = false;

        showMessage('Cliente agregado exitosamente', 'success');
        loadClients();
      } catch (error) {
        showMessage('Error al agregar cliente', 'error');
        console.error(error);
      }
    }

    function startEdit(id, nombre, telefono) {
      document.getElementById(`nombre-${id}`).innerHTML = `<input type="text" value="${nombre}" id="edit-nombre-${id}" style="width:100%; padding:4px; border:1px solid #ddd; border-radius:4px;">`;
      document.getElementById(`telefono-${id}`).innerHTML = `<input type="tel" value="${telefono}" id="edit-telefono-${id}" style="width:100%; padding:4px; border:1px solid #ddd; border-radius:4px;">`;
      const actions = document.querySelector(`#row-${id} .actions-cell`);
      actions.innerHTML = `
        <button style="background:#28a745; padding:6px 12px; font-size:12px;" onclick="saveEdit(${id})">Guardar</button>
        <button style="background:#6c757d; padding:6px 12px; font-size:12px;" onclick="loadClients()">Cancelar</button>
      `;
    }

    async function saveEdit(id) {
      const nombre = document.getElementById(`edit-nombre-${id}`).value.trim();
      const telefono = document.getElementById(`edit-telefono-${id}`).value.trim();

      if (!nombre || !telefono) {
        showMessage('Nombre y teléfono son requeridos', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/clients/${id}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({ nombre, telefono })
        });
        if (!response.ok) throw new Error('Error al actualizar');
        showMessage('Cliente actualizado', 'success');
        loadClients();
      } catch (error) {
        showMessage('Error al actualizar cliente', 'error');
      }
    }

    async function togglePayment(clientId, paid) {
      try {
        const response = await fetch(`${API_URL}/clients/${clientId}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({ pagado: paid })
        });

        if (!response.ok) throw new Error('Error al actualizar');

        showMessage(paid ? 'Cliente marcado como pagado' : 'Cliente marcado como no pagado', 'success');
        loadClients();
      } catch (error) {
        showMessage('Error al actualizar estado', 'error');
        console.error(error);
      }
    }

    async function deleteClient(clientId) {
      if (!confirm('¿Eliminar este cliente?')) return;

      try {
        const response = await fetch(`${API_URL}/clients/${clientId}`, {
          method: 'DELETE',
          headers: authHeaders()
        });

        if (!response.ok) throw new Error('Error al eliminar');

        showMessage('Cliente eliminado', 'success');
        loadClients();
      } catch (error) {
        showMessage('Error al eliminar cliente', 'error');
        console.error(error);
      }
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      setTimeout(() => {
        messageDiv.innerHTML = '';
      }, 5000);
    }

    async function sendMessages(messageType) {
      try {
        const response = await fetch(`${API_URL}/send-messages`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ messageType })
        });

        if (!response.ok) throw new Error('Error al enviar mensajes');

        const result = await response.json();
        const typeLabel = messageType === 'day8' ? 'Día 8' : 'Día 10';
        showMessage(`✓ Mensajes enviados a ${result.sent} clientes (${typeLabel})`, 'success');
      } catch (error) {
        showMessage('Error al enviar mensajes', 'error');
        console.error(error);
      }
    }

    checkAuth();
  </script>
</body>
</html>
