<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppGym - Gestión de Clientes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .form-section {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 30px;
      border-left: 4px solid #007bff;
    }

    .form-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    input[type="text"],
    input[type="tel"] {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #555;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    button.delete {
      background: #dc3545;
      padding: 6px 12px;
      font-size: 12px;
    }

    button.delete:hover {
      background: #c82333;
    }

    .table-section {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    thead {
      background: #f1f1f1;
    }

    th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #ddd;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      color: #666;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .checkbox-cell {
      text-align: center;
    }

    .actions-cell {
      text-align: center;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-paid {
      background: #d4edda;
      color: #155724;
    }

    .status-unpaid {
      background: #f8d7da;
      color: #721c24;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #f5c6cb;
    }

    .success {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #c3e6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏋️ AppGym - Gestión de Clientes</h1>

    <div id="message"></div>

    <div class="form-section">
      <h2 style="margin-bottom: 15px; font-size: 18px; color: #333;">Agregar Cliente</h2>
      <div class="form-group">
        <input
          type="text"
          id="nombre"
          placeholder="Nombre del cliente"
        />
        <input
          type="tel"
          id="telefono"
          placeholder="Teléfono (ej: 1123456789)"
        />
        <label>
          <input type="checkbox" id="pagado" />
          Pagado
        </label>
        <button onclick="addClient()">Agregar Cliente</button>
      </div>
    </div>

    <div class="table-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin: 0; font-size: 18px; color: #333;">Clientes</h2>
        <div style="gap: 10px; display: flex;">
          <button onclick="sendMessages('day8')" style="background: #28a745;">📱 Recordatorio Día 8</button>
          <button onclick="sendMessages('day10')" style="background: #dc3545;">⚠️ Aviso Día 10</button>
        </div>
      </div>
      <div id="clientsList"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3001/api';

    async function loadClients() {
      try {
        const response = await fetch(`${API_URL}/clients`);
        const clients = await response.json();
        renderClients(clients);
      } catch (error) {
        showMessage('Error cargando clientes', 'error');
        console.error(error);
      }
    }

    function renderClients(clients) {
      const container = document.getElementById('clientsList');

      if (clients.length === 0) {
        container.innerHTML = '<div class="empty-state">No hay clientes. Agrega uno para empezar.</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Estado</th>
              <th>Pagado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
      `;

      clients.forEach(client => {
        const statusBadge = client.pagado
          ? '<span class="status-badge status-paid">✓ Pagado</span>'
          : '<span class="status-badge status-unpaid">✗ No pagado</span>';

        html += `
          <tr>
            <td>${client.nombre}</td>
            <td>${client.telefono}</td>
            <td>${statusBadge}</td>
            <td class="checkbox-cell">
              <input
                type="checkbox"
                ${client.pagado ? 'checked' : ''}
                onchange="togglePayment(${client.id}, this.checked)"
              />
            </td>
            <td class="actions-cell">
              <button class="delete" onclick="deleteClient(${client.id})">Eliminar</button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    async function addClient() {
      const nombre = document.getElementById('nombre').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const pagado = document.getElementById('pagado').checked;

      if (!nombre || !telefono) {
        showMessage('Completa nombre y teléfono', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/clients`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, telefono, pagado })
        });

        if (!response.ok) throw new Error('Error al crear cliente');

        document.getElementById('nombre').value = '';
        document.getElementById('telefono').value = '';
        document.getElementById('pagado').checked = false;

        showMessage('Cliente agregado exitosamente', 'success');
        loadClients();
      } catch (error) {
        showMessage('Error al agregar cliente', 'error');
        console.error(error);
      }
    }

    async function togglePayment(clientId, paid) {
      try {
        const response = await fetch(`${API_URL}/clients/${clientId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pagado: paid })
        });

        if (!response.ok) throw new Error('Error al actualizar');

        showMessage(paid ? 'Cliente marcado como pagado' : 'Cliente marcado como no pagado', 'success');
        loadClients();
      } catch (error) {
        showMessage('Error al actualizar estado', 'error');
        console.error(error);
      }
    }

    async function deleteClient(clientId) {
      if (!confirm('¿Eliminar este cliente?')) return;

      try {
        const response = await fetch(`${API_URL}/clients/${clientId}`, {
          method: 'DELETE'
        });

        if (!response.ok) throw new Error('Error al eliminar');

        showMessage('Cliente eliminado', 'success');
        loadClients();
      } catch (error) {
        showMessage('Error al eliminar cliente', 'error');
        console.error(error);
      }
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      setTimeout(() => {
        messageDiv.innerHTML = '';
      }, 5000);
    }

    async function sendMessages(messageType) {
      try {
        const response = await fetch(`${API_URL}/send-messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messageType })
        });

        if (!response.ok) throw new Error('Error al enviar mensajes');

        const result = await response.json();
        const typeLabel = messageType === 'day8' ? 'Día 8' : 'Día 10';
        showMessage(`✓ Mensajes enviados a ${result.sent} clientes (${typeLabel})`, 'success');
      } catch (error) {
        showMessage('Error al enviar mensajes', 'error');
        console.error(error);
      }
    }

    // Load clients on page load
    loadClients();
  </script>
</body>
</html>
